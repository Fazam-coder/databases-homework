pg_version:
  query: |
    SELECT 
      current_setting('server_version') AS version,
      current_setting('server_version_num')::int AS version_num;
  metrics:
    - version:
        usage: "LABEL"
        description: "PostgreSQL server version"
    - version_num:
        usage: "GAUGE"
        description: "PostgreSQL server version number"

# Активные сессии по статусу
pg_active_sessions:
  query: |
    SELECT 
      state,
      count(*) AS sessions
    FROM pg_stat_activity 
    WHERE datname = current_database()
    GROUP BY state;
  metrics:
    - state:
        usage: "LABEL"
        description: "Session state"
    - sessions:
        usage: "GAUGE"
        description: "Number of active sessions by state"

# Статистика запросов по типу (SELECT/INSERT/UPDATE/DELETE)
pg_query_stats:
  query: |
    SELECT 
      CASE 
        WHEN query ~* '^SELECT' THEN 'select'
        WHEN query ~* '^INSERT' THEN 'insert'
        WHEN query ~* '^UPDATE' THEN 'update'
        WHEN query ~* '^DELETE' THEN 'delete'
        ELSE 'other'
      END AS query_type,
      sum(calls) AS total_calls,
      sum(total_exec_time) AS total_time_ms
    FROM pg_stat_statements
    WHERE dbid = (SELECT oid FROM pg_database WHERE datname = current_database())
    GROUP BY 
      CASE 
        WHEN query ~* '^SELECT' THEN 'select'
        WHEN query ~* '^INSERT' THEN 'insert'
        WHEN query ~* '^UPDATE' THEN 'update'
        WHEN query ~* '^DELETE' THEN 'delete'
        ELSE 'other'
      END;
  metrics:
    - query_type:
        usage: "LABEL"
        description: "Query type"
    - total_calls:
        usage: "COUNTER"
        description: "Total calls by query type"
    - total_time_ms:
        usage: "COUNTER"
        description: "Total execution time ms by query type"

# Статистика по таблицам
pg_table_stats:
  query: |
    SELECT 
      relname AS table_name,
      seq_scan,
      idx_scan,
      n_tup_ins,
      n_tup_upd,
      n_tup_del,
      n_live_tup
    FROM pg_stat_user_tables;
  metrics:
    - table_name:
        usage: "LABEL"
    - seq_scan:
        usage: "COUNTER"
    - idx_scan:
        usage: "COUNTER"
    - n_tup_ins:
        usage: "COUNTER"
    - n_tup_upd:
        usage: "COUNTER"
    - n_tup_del:
        usage: "COUNTER"
    - n_live_tup:
        usage: "GAUGE"