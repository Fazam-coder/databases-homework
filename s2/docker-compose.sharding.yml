services:
  shard1:
    image: postgres:15
    container_name: shard1
    environment:
      POSTGRES_DB: shard1_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5440:5432"
    volumes:
      - shard1_data:/var/lib/postgresql/data
    networks:
      - sharding_net
    command: >
      postgres
      -c max_connections=200

  shard2:
    image: postgres:15
    container_name: shard2
    environment:
      POSTGRES_DB: shard2_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5441:5432"
    volumes:
      - shard2_data:/var/lib/postgresql/data
    networks:
      - sharding_net
    command: >
      postgres
      -c max_connections=200

  router:
    image: postgres:15
    container_name: fdw_router
    environment:
      POSTGRES_DB: router_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5442:5432"
    volumes:
      - router_data:/var/lib/postgresql/data
    networks:
      - sharding_net
    depends_on:
      - shard1
      - shard2
    command: >
      postgres
      -c max_connections=200

networks:
  sharding_net:
    driver: bridge

volumes:
  shard1_data:
  shard2_data:
  router_data: