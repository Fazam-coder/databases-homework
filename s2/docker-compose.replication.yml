services:
  # MASTER
  postgres_master:
    image: postgres:15
    container_name: pg_master
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_master_data:/var/lib/postgresql/data
      - ./replication/master/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - replication_net

  # REPLICA 1
  postgres_replica1:
    image: postgres:15
    container_name: pg_replica1
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5433:5432"
    volumes:
      - pg_replica1_data:/var/lib/postgresql/data
    networks:
      - replication_net
    depends_on:
      - postgres_master

  # REPLICA 2
  postgres_replica2:
    image: postgres:15
    container_name: pg_replica2
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5434:5432"
    volumes:
      - pg_replica2_data:/var/lib/postgresql/data
    networks:
      - replication_net
    depends_on:
      - postgres_master

  # LOGICAL REPLICA
  postgres_logical:
    image: postgres:15
    container_name: pg_logical
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5435:5432"
    volumes:
      - pg_logical_data:/var/lib/postgresql/data
    networks:
      - replication_net
    depends_on:
      - postgres_master

networks:
  replication_net:
    driver: bridge

volumes:
  pg_master_data:
  pg_replica1_data:
  pg_replica2_data:
  pg_logical_data: